stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  AWS_REGION: "us-east-1"

# ─── Backend ───────────────────────────────────────────────
backend:lint:
  stage: lint
  image: python:3.12-slim
  cache:
    paths: [.cache/pip]
  before_script:
    - cd backend
    - pip install ruff
  script:
    - ruff check app
    - ruff format --check app

backend:test:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test
    POSTGRES_PASSWORD: test
    DATABASE_URL: "postgresql+asyncpg://test:test@postgres:5432/test_db"
    REDIS_URL: "redis://redis:6379/0"
  before_script:
    - cd backend
    - pip install -r requirements.txt
  script:
    - pytest -q --cov=app --cov-report=term-missing

# ─── Frontend ──────────────────────────────────────────────
frontend:lint:
  stage: lint
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint
    - npm run typecheck

frontend:test:
  stage: test
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build

# ─── Build & push images (AWS ECR) ─────────────────────────
build:images:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
  script:
    - docker build -t "$ECR_REGISTRY/ai-research-graph-backend:$CI_COMMIT_SHORT_SHA" ./backend
    - docker build -t "$ECR_REGISTRY/ai-research-graph-frontend:$CI_COMMIT_SHORT_SHA" ./frontend
    - docker push "$ECR_REGISTRY/ai-research-graph-backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$ECR_REGISTRY/ai-research-graph-frontend:$CI_COMMIT_SHORT_SHA"

# ─── Deploy (AWS ECS, manual gate) ─────────────────────────
deploy:staging:
  stage: deploy
  image: python:3.12-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  before_script:
    - pip install awscli
  script:
    - echo "Roll new task definition to ECS service (blue/green via CodeDeploy)."
    - aws ecs update-service --cluster ai-research-graph --service backend --force-new-deployment --region "$AWS_REGION"
    - aws ecs update-service --cluster ai-research-graph --service frontend --force-new-deployment --region "$AWS_REGION"
